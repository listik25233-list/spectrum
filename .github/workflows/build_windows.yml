name: Build Windows Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Configure Git
        run: |
          git config --global core.symlinks true
          git config --global core.longpaths true
        shell: bash

      - uses: actions/checkout@v4

      - name: Enable Windows Developer Mode
        shell: pwsh
        run: |
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v "LongPathsEnabled" /t REG_DWORD /d 1 /f
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /v "AllowDevelopmentWithoutDevLicense" /d 1 /f

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
            channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install LLVM (Clang)
        run: choco install llvm -y

      - name: Install FRB Codegen
        uses: taiki-e/install-action@v2
        with:
          tool: flutter_rust_bridge_codegen@2.7.0

      - name: Install Flutter Dependencies
        run: |
          flutter config --enable-windows-desktop
          flutter pub get

      - name: Code Generation
        shell: pwsh
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter_rust_bridge_codegen generate

      - name: Pre-build Rust Library (Manual Override)
        shell: pwsh
        run: |
          cd rust
          cargo build --release
          cd ..
          # Create the expected directory structure for the plugin
          $destDir = "build/windows/x64/plugins/rust_lib_spectrum/Release"
          if (-not (Test-Path $destDir)) { New-Item -Path $destDir -ItemType Directory -Force }
          # Copy the DLL manually to bypass symlink issues
          Copy-Item "rust/target/release/rust_lib_spectrum.dll" -Destination "$destDir/rust_lib_spectrum.dll" -Force

      - name: Build Windows
        shell: pwsh
        run: |
          # Now build the app, it will find the pre-built DLL
          flutter build windows --release

      - name: Package Release
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          if (-not (Test-Path $releaseDir)) {
             $releaseDir = "build/windows/runner/Release" 
          }
          if (Test-Path $releaseDir) {
            Compress-Archive -Path "$releaseDir\*" -DestinationPath spectrum_windows_x64.zip
          } else {
            Write-Error "CRITICAL: Release directory not found!"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectrum-windows-release
          path: spectrum_windows_x64.zip
