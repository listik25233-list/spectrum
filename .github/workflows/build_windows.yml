name: Build Windows Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Configure Git for Symlinks
        run: git config --global core.symlinks true
        shell: bash

      - uses: actions/checkout@v4

      - name: Enable Windows Developer Mode
        shell: pwsh
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /v "AllowDevelopmentWithoutDevLicense" /d 1 /f

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
            channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install LLVM (Clang)
        run: choco install llvm -y

      - name: Install FRB Codegen
        uses: taiki-e/install-action@v2
        with:
          tool: flutter_rust_bridge_codegen@2.7.0

      - name: Install Flutter Dependencies
        run: |
          flutter config --enable-windows-desktop
          flutter pub get

      - name: Code Generation
        shell: pwsh
        run: |
          # 1. Isar
          dart run build_runner build --delete-conflicting-outputs
          # 2. FRB
          flutter_rust_bridge_codegen generate

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Release
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          if (-not (Test-Path $releaseDir)) {
             $releaseDir = "build/windows/runner/Release" 
          }
          if (Test-Path $releaseDir) {
            Compress-Archive -Path "$releaseDir\*" -DestinationPath spectrum_windows_x64.zip
          } else {
            Write-Error "CRITICAL: Release directory not found!"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectrum-windows-full
          path: spectrum_windows_x64.zip
