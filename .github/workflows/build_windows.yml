name: Build Windows Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
            flutter-version: '3.x'
            channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Isar)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Release
        run: |
          $path = (Get-ChildItem -Path build/windows -Filter spectrum.exe -Recurse | Where-Object { $_.FullName -like "*release*" } | Select-Object -First 1).DirectoryName
          if (-not $path) { 
            Write-Error "Could not find spectrum.exe in build/windows"
            exit 1 
          }
          Write-Output "Packaging files from: $path"
          Compress-Archive -Path "$path\*" -DestinationPath spectrum_windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectrum-windows-release
          path: spectrum_windows.zip
