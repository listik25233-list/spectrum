name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Install Dependencies
        run: |
          flutter config --no-analytics --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter precache --ios
          flutter build ios --config-only --no-codesign
          cd ios && rm -rf Pods Podfile.lock && cd ..

      - name: Debug Info
        run: |
          ls -R ios/Flutter
          cat ios/Podfile

      - name: Build iOS (IPA)
        env:
          ARCHS: arm64
          LD_GENERATE_DEPENDENCY_INFO: "NO"
          GENERATE_DEPENDENCY_INFO: "NO"
        run: |
          flutter build ios --release --no-codesign --verbose
          mkdir -p Payload
          mv build/ios/Release-iphoneos/Runner.app Payload/
          zip -r Spectrum.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: spectrum-ios-ipa
          path: Spectrum.ipa
