name: spectrum
description: A cross-platform music aggregator unifying all streaming services.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Networking
  dio: ^5.8.0+1
  socket_io_client: ^3.0.0

  # Auth / OAuth
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^10.0.0

  # Audio
  audio_session: ^0.1.21

  # Offline / Background
  connectivity_plus: ^6.1.4
  workmanager: ^0.9.0+3

  # Utilities
  crypto: ^3.0.6
  equatable: ^2.0.7
  logger: ^2.5.0
  intl: ^0.20.2
  ffi: ^2.1.3

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  animations: ^2.0.11
  youtube_explode_dart: ^3.0.5
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  flutter_local_notifications: ^17.2.2
  palette_generator: ^0.3.3+7
  audio_service: ^0.18.17
  media_kit_libs_linux: ^1.2.1
  audio_service_mpris: ^0.2.1
  window_manager: ^0.5.1
  flutter_colorpicker: ^1.1.0
  flutter_soloud: ^4.0.0
  uuid: ^4.5.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  rust_lib_spectrum:
    path: rust_builder
  flutter_rust_bridge: 2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  integration_test:
    sdk: flutter
  # Note: isar_generator + build_runner are added separately when running
  # code generation, due to analyzer version conflicts with other codegen tools.
  # Run: flutter pub add dev:isar_generator dev:build_runner
  # Then: flutter pub run build_runner build

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/icons/app_icon.png
